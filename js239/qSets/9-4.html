<html>
  <head>
    <style>
      #accordion ul {
        display: none;
      }

      #accordion li.active > ul {
        display: block;
      }
    </style>
  </head>
  <body>
    <ul id="accordion">
      <li>
        <div class="header">Section 1</div>
        <ul>
          <li>Item 1.1</li>
          <li>Item 1.2</li>
          <li>
            <div class="header">Section 1.3</div>
            <ul>
              <li>Item 1.3.1</li>
            </ul>
          </li>
        </ul>
      </li>
      <li>
        <div class="header">Section 2</div>
        <ul>
          <li>Item 2.1</li>
        </ul>
      </li>
    </ul>
    <script>
      const accordion = document.querySelector('#accordion');

      accordion.addEventListener('click', e => {
        if (!e.target.classList.contains('header')) return;
        const parent = e.target.closest('li');
        console.log(parent);
        parent.classList.toggle('active');
      });
    </script>
  </body>
</html>
