<html>
  <head>
  </head>
  <body>
    <div id="gallery">
      <img id="main-image" src="image1.jpg" alt="Image 1">
      <div id="thumbnails">
      <img src="image1.jpg" alt="Image 1" class="thumb">
      <img src="image2.jpg" alt="Image 2" class="thumb">
      <img src="image3.jpg" alt="Image 3" class="thumb">
      <img src="image4.jpg" alt="Image 4" class="thumb">
      </div>
    </div>
    <script>
      const gallery = document.getElementById('gallery');

      gallery.addEventListener('click', (e) => {
        const img = e.target;
        const mainImg = document.getElementById('main-image');
        if (img.tagName !== 'IMG') return;
        mainImg.src = img.src;
        mainImg.alt = img.alt;
      })
    </script>
  </body>
</html>
