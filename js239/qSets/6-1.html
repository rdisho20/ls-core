<html>
  <head>
    <style>
      .highlight {
        background-color: yellow;
        border: 1px solid gold;
      }
    </style>
  </head>
  <body>
    <ul id="list">
      <li>Item 1</li>
      <li class="parent">Item 2
        <ul>
          <li>Item 2.1</li>
          <li class="parent">Item 2.2
            <ul>
              <li>Item 2.2.1</li>
              <li>Item 2.2.2</li>
            </ul>
          </li>
          <li>Item 2.3</li>
        </ul>
      </li>
      <li>Item 3</li>
    </ul>

    <script>
      function walkBackwards(node) {
        node.classList.add('highlight');
        const parent = node.parentNode;
        if (parent !== document.body) {
          walkBackwards(parent);
        }
      }

      document.getElementById('list').addEventListener('click', (event) => {
        if (event.target.tagName === 'LI') {
          console.log(event.target);
          walkBackwards(event.target);
        }
      })
    </script>
  </body>
</html>
