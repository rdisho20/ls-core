<!DOCTYPE html>
<html lang="en">  
  <head>  
    <title>Posts</title>  
  </head>  
  <body>  
    <h1>Posts</h1>  
    <button id="load-posts">Load Posts</button>  
    <ul id="posts-list"></ul>  
    <p id="error-message" style="color: red;"></p>
    <script>
      const button = document.getElementById('load-posts');
      const ul = document.getElementById('posts-list');
      const p = document.getElementById('error-message');

      button.addEventListener('click', async (e) => {
        try {
          const response = await fetch('https://jsonplaceholder.typicode.com/posts');

          if (!response.ok) {
            throw new Error('Failed due to a network error')
          }

          const json = await response.json();
          json.forEach(post => {
            const li = document.createElement('LI');
            li.textContent = post.title;
            ul.append(li);
          })
        } catch (error) {
          p.textContent = error.message;
        }
      })
    </script> 
  </body>  
</html>
