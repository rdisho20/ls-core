<ul id="insertion-list">
  <li>Item 1
    <button class="above">Insert Above</button>
    <button class="below">Insert Below</button>
  </li>
  <li>Item 2
    <button class="above">Insert Above</button>
    <button class="below">Insert Below</button>
  </li>
</ul>
<script>
  const ul = document.getElementById('insertion-list');
  ul.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') return;
    const li = document.createElement('li');
    li.textContent = "New Item";
    const current = e.target.closest('li');
    if (e.target.classList.contains('above')) {
      ul.insertBefore(li, current);
    } else if (e.target.classList.contains('below')) {
      ul.insertBefore(li, current.nextElementSibling);
    }
  })
</script>
